<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>おてつだいシール帳 ⭐</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', 'Yu Gothic', sans-serif;
      overscroll-behavior: none;
      background-color: #fefce8;
    }
    .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 4px); }
    @keyframes pop-in {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-in { animation: pop-in 0.15s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ======================================================
    //  設定 — GAS_URL にデプロイIDを入力してください
    // ======================================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxszoCwngdP921Zbsr86H-aPPBXqemUZpgcPtRporOqeZo_WwBpabVHjQ5GqHOMtbMRmQ/exec';

    // ユーザー名・絵文字はここで変更できます
    const USERS = [
      { id: 'u1', name: 'ゆめ',  emoji: '🌸' },
      { id: 'u2', name: 'はな',  emoji: '🌺' },
    ];

    // オフライン時に使うモックデータ
    const MOCK_TASKS = [
      { id: 't1', name: 'しょっきあらい',   price: 50,  icon: '🍽️' },
      { id: 't2', name: 'おふろそうじ',     price: 100, icon: '🛁' },
      { id: 't3', name: 'そうじきがけ',     price: 80,  icon: '🧹' },
      { id: 't4', name: 'せんたくたたみ',   price: 60,  icon: '👕' },
    ];

    // ユーザーごとのカラーパレット（静的クラス名でTailwindに認識させる）
    const USER_COLORS = {
      u1: {
        tabActive:   'bg-pink-400 text-white shadow-md',
        tabInactive: 'bg-white text-pink-400 border border-pink-200',
        cellBg:      'bg-pink-100',
        stickerBg:   'bg-pink-200',
        badgeBg:     'bg-pink-500',
        totalGrad:   'from-pink-400 to-rose-400',
        ringColor:   'ring-pink-400',
        textColor:   'text-pink-600',
        lightBg:     'bg-pink-50',
      },
      u2: {
        tabActive:   'bg-purple-400 text-white shadow-md',
        tabInactive: 'bg-white text-purple-400 border border-purple-200',
        cellBg:      'bg-purple-100',
        stickerBg:   'bg-purple-200',
        badgeBg:     'bg-purple-500',
        totalGrad:   'from-purple-400 to-indigo-400',
        ringColor:   'ring-purple-400',
        textColor:   'text-purple-600',
        lightBg:     'bg-purple-50',
      },
    };

    const DAY_NAMES = ['日', '月', '火', '水', '木', '金', '土'];

    // ======================================================
    //  ユーティリティ
    // ======================================================
    function toDateKey(year, month, day) {
      return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }
    function getDaysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }
    function getFirstDayOfMonth(year, month) {
      return new Date(year, month, 1).getDay();
    }

    // ======================================================
    //  Toast
    // ======================================================
    function Toast({ message, type }) {
      const bg = type === 'error' ? 'bg-red-500' : 'bg-green-500';
      return (
        <div
          className={`fixed top-4 left-1/2 -translate-x-1/2 z-50 ${bg} text-white
            px-5 py-2.5 rounded-full shadow-xl font-bold text-sm pop-in`}
        >
          {message}
        </div>
      );
    }

    // ======================================================
    //  ユーザータブ
    // ======================================================
    function UserTabs({ currentUserId, onChange }) {
      return (
        <div className="flex gap-3 justify-center py-2 px-4">
          {USERS.map(user => {
            const c = USER_COLORS[user.id];
            const isActive = user.id === currentUserId;
            return (
              <button
                key={user.id}
                onClick={() => onChange(user.id)}
                className={`flex items-center gap-1.5 px-6 py-1.5 rounded-full font-bold text-sm
                  transition-all active:scale-95
                  ${isActive ? c.tabActive : c.tabInactive}`}
              >
                <span>{user.emoji}</span>
                <span>{user.name}</span>
              </button>
            );
          })}
        </div>
      );
    }

    // ======================================================
    //  カレンダーセル
    // ======================================================
    function CalendarCell({ day, dateKey, tasks, userTasks, isToday, isSunday, isSaturday, currentUserId, onClick }) {
      const c = USER_COLORS[currentUserId];
      const taskById = useMemo(() => {
        const m = {};
        tasks.forEach(t => { m[t.id] = t; });
        return m;
      }, [tasks]);

      const hasTasks = userTasks.length > 0;
      const visible = userTasks.slice(0, 2);
      const extra  = userTasks.length - 2;

      const dayColor = isSunday ? 'text-red-400' : isSaturday ? 'text-blue-400' : 'text-gray-600';

      return (
        <button
          onClick={() => onClick(dateKey)}
          className={`aspect-square overflow-hidden flex flex-col items-center justify-start
            rounded-xl transition-all active:scale-90 p-0.5
            ${hasTasks ? c.cellBg + ' shadow-sm' : 'bg-white'}
            ${isToday ? 'ring-2 ring-offset-1 ' + c.ringColor : ''}`}
        >
          {/* 日付 */}
          <span className={`font-bold text-xs leading-tight mt-0.5 ${isToday ? c.textColor : dayColor}`}>
            {day}
          </span>
          {/* シール */}
          <div className="flex flex-wrap justify-center gap-px mt-px overflow-hidden">
            {visible.map(taskId => {
              const task = taskById[taskId];
              return task ? (
                <span
                  key={taskId}
                  className={`${c.stickerBg} rounded-full w-5 h-5 flex items-center justify-center leading-none`}
                  style={{ fontSize: '0.6rem' }}
                >
                  {task.icon}
                </span>
              ) : null;
            })}
            {extra > 0 && (
              <span
                className={`${c.badgeBg} text-white rounded-full w-5 h-5 flex items-center
                  justify-center font-bold leading-none`}
                style={{ fontSize: '0.55rem' }}
              >
                +{extra}
              </span>
            )}
          </div>
        </button>
      );
    }

    // ======================================================
    //  カレンダー画面
    // ======================================================
    function CalendarScreen({ tasks, records, currentUserId, currentMonth, setCurrentMonth, onDayClick }) {
      const { year, month } = currentMonth;
      const today = new Date();

      const daysInMonth = getDaysInMonth(year, month);
      const firstDay   = getFirstDayOfMonth(year, month);

      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);

      return (
        <div className="flex flex-col h-full select-none">
          {/* 月ナビ */}
          <div className="flex items-center justify-between px-4 py-1.5 flex-shrink-0">
            <button
              onClick={() => setCurrentMonth(m => {
                const d = new Date(m.year, m.month - 1);
                return { year: d.getFullYear(), month: d.getMonth() };
              })}
              className="w-9 h-9 flex items-center justify-center rounded-full bg-white shadow
                text-gray-600 font-bold text-xl active:scale-90"
            >
              ‹
            </button>
            <span className="font-black text-gray-700 text-base">
              {year}年 {month + 1}月
            </span>
            <button
              onClick={() => setCurrentMonth(m => {
                const d = new Date(m.year, m.month + 1);
                return { year: d.getFullYear(), month: d.getMonth() };
              })}
              className="w-9 h-9 flex items-center justify-center rounded-full bg-white shadow
                text-gray-600 font-bold text-xl active:scale-90"
            >
              ›
            </button>
          </div>

          {/* 曜日ヘッダー */}
          <div className="grid grid-cols-7 px-2 gap-1 flex-shrink-0">
            {DAY_NAMES.map((d, i) => (
              <div
                key={i}
                className={`text-center text-xs font-bold py-0.5
                  ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-gray-400'}`}
              >
                {d}
              </div>
            ))}
          </div>

          {/* カレンダーグリッド */}
          <div className="grid grid-cols-7 gap-1 px-2 py-1 flex-1">
            {cells.map((day, idx) => {
              if (!day) return <div key={`e-${idx}`} className="aspect-square" />;
              const dateKey   = toDateKey(year, month, day);
              const userTasks = records[dateKey]?.[currentUserId] || [];
              const isToday   = today.getFullYear() === year &&
                                today.getMonth()    === month &&
                                today.getDate()     === day;
              const dow = (firstDay + day - 1) % 7;
              return (
                <CalendarCell
                  key={dateKey}
                  day={day}
                  dateKey={dateKey}
                  tasks={tasks}
                  userTasks={userTasks}
                  isToday={isToday}
                  isSunday={dow === 0}
                  isSaturday={dow === 6}
                  currentUserId={currentUserId}
                  onClick={onDayClick}
                />
              );
            })}
          </div>
        </div>
      );
    }

    // ======================================================
    //  日タスク選択モーダル
    // ======================================================
    function DayModal({ dateKey, tasks, records, currentUserId, onToggle, onClose, isOffline }) {
      const c    = USER_COLORS[currentUserId];
      const user = USERS.find(u => u.id === currentUserId);
      const userTasks = records[dateKey]?.[currentUserId] || [];

      const [mm, dd] = dateKey.split('-').slice(1).map(Number);

      return (
        <div className="fixed inset-0 z-40 flex items-end justify-center">
          {/* オーバーレイ */}
          <div className="absolute inset-0 bg-black/40" onClick={onClose} />

          {/* シート */}
          <div className="relative w-full max-w-md bg-white rounded-t-3xl shadow-2xl z-50 pop-in">
            {/* ハンドル */}
            <div className="flex justify-center pt-3 pb-1">
              <div className="w-10 h-1 bg-gray-200 rounded-full" />
            </div>

            <div className="px-4 pb-2">
              <div className="flex justify-between items-center mb-3">
                <div>
                  <span className="font-black text-gray-700 text-base">
                    {mm}がつ {dd}にち
                  </span>
                  <span className="ml-2 text-sm text-gray-400">
                    {user.emoji} {user.name}のおてつだい
                  </span>
                </div>
                <button
                  onClick={onClose}
                  className="w-7 h-7 flex items-center justify-center rounded-full
                    bg-gray-100 text-gray-500 text-xs font-bold"
                >
                  ✕
                </button>
              </div>

              {isOffline && (
                <div className="mb-3 text-xs text-orange-600 bg-orange-50 px-3 py-2 rounded-xl">
                  ⚠️ オフラインモード。インターネットにつながっていないため、きろくは保存されません。
                </div>
              )}

              <div className="grid grid-cols-2 gap-2 pb-6">
                {tasks.map(task => {
                  const done = userTasks.includes(task.id);
                  return (
                    <button
                      key={task.id}
                      onClick={() => !isOffline && onToggle(dateKey, currentUserId, task.id, done)}
                      disabled={isOffline}
                      className={`flex items-center gap-2 p-3 rounded-2xl border-2 transition-all
                        active:scale-95 text-left
                        ${done
                          ? `${c.cellBg} border-transparent`
                          : 'bg-gray-50 border-gray-100 hover:bg-gray-100'}
                        ${isOffline ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}`}
                    >
                      <span
                        className={`text-xl w-10 h-10 flex items-center justify-center
                          rounded-xl flex-shrink-0
                          ${done ? c.stickerBg : 'bg-white shadow-sm'}`}
                      >
                        {task.icon}
                      </span>
                      <div className="flex-1 min-w-0">
                        <div className={`text-xs font-bold truncate
                          ${done ? c.textColor : 'text-gray-700'}`}>
                          {task.name}
                        </div>
                        <div className={`text-xs ${done ? c.textColor : 'text-gray-400'}`}>
                          ¥{task.price}
                        </div>
                      </div>
                      {done && <span className="text-base flex-shrink-0">✅</span>}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ======================================================
    //  おこづかい画面
    // ======================================================
    function AllowanceScreen({ tasks, records, currentUserId, currentMonth }) {
      const { year, month } = currentMonth;
      const c    = USER_COLORS[currentUserId];
      const user = USERS.find(u => u.id === currentUserId);

      const taskById = useMemo(() => {
        const m = {};
        tasks.forEach(t => { m[t.id] = t; });
        return m;
      }, [tasks]);

      const { total, dailyRecords } = useMemo(() => {
        let total = 0;
        const dailyRecords = [];
        const days = getDaysInMonth(year, month);

        for (let d = 1; d <= days; d++) {
          const dateKey   = toDateKey(year, month, d);
          const taskIds   = records[dateKey]?.[currentUserId];
          if (!taskIds || taskIds.length === 0) continue;

          let dayTotal = 0;
          const details = taskIds.map(id => {
            const t = taskById[id];
            if (t) { dayTotal += t.price; total += t.price; }
            return t;
          }).filter(Boolean);

          if (details.length > 0) {
            dailyRecords.push({ dateKey, day: d, tasks: details, dayTotal });
          }
        }
        return { total, dailyRecords };
      }, [records, currentUserId, year, month, taskById]);

      return (
        <div className="h-full overflow-auto">
          {/* 合計カード */}
          <div
            className={`mx-4 mt-3 mb-4 rounded-3xl bg-gradient-to-r ${c.totalGrad}
              p-5 text-white shadow-lg`}
          >
            <div className="text-sm font-bold opacity-90 mb-1">
              {user.emoji} {user.name}の {month + 1}がつの おこづかい
            </div>
            <div className="flex items-baseline gap-1">
              <span className="text-5xl font-black">¥{total.toLocaleString()}</span>
            </div>
            <div className="text-xs opacity-80 mt-1">
              {dailyRecords.length > 0
                ? `${dailyRecords.reduce((s, r) => s + r.tasks.length, 0)}かいぶんのおてつだい`
                : 'まだきろくがないよ'}
            </div>
          </div>

          {/* がんばった きろく */}
          <div className="px-4 pb-6 space-y-2">
            <div className="font-bold text-gray-500 text-xs mb-2">📋 がんばった きろく</div>

            {dailyRecords.length === 0 ? (
              <div className="text-center py-10 text-gray-300">
                <div className="text-5xl mb-3">🌟</div>
                <div className="text-sm font-bold">おてつだいのきろくがないよ</div>
                <div className="text-xs mt-1">カレンダーからシールをはってみよう！</div>
              </div>
            ) : (
              dailyRecords.map(({ dateKey, day, tasks: dayTasks, dayTotal }) => (
                <div key={dateKey} className={`${c.lightBg} rounded-2xl p-3`}>
                  <div className="flex justify-between items-center mb-1.5">
                    <span className="font-bold text-gray-600 text-sm">
                      {month + 1}がつ {day}にち
                    </span>
                    <span className={`font-black ${c.textColor} text-sm`}>
                      +¥{dayTotal.toLocaleString()}
                    </span>
                  </div>
                  <div className="flex flex-wrap gap-1.5">
                    {dayTasks.map((task, i) => (
                      <div
                        key={i}
                        className="flex items-center gap-1 bg-white rounded-full px-2 py-1 shadow-sm"
                      >
                        <span className="text-sm">{task.icon}</span>
                        <span className="text-xs text-gray-600">{task.name}</span>
                        <span className={`text-xs font-bold ${c.textColor}`}>¥{task.price}</span>
                      </div>
                    ))}
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // ======================================================
    //  せってい画面
    // ======================================================
    function SettingsScreen({ tasks, isOffline }) {
      return (
        <div className="h-full overflow-auto px-4 py-3">
          <div className="flex items-center gap-2 mb-3">
            <span className="text-xl">⚙️</span>
            <h2 className="font-black text-gray-700 text-base">おてつだいのしゅるい</h2>
          </div>

          <div className="space-y-2 mb-6">
            {tasks.map((task, i) => (
              <div
                key={task.id}
                className="flex items-center gap-3 bg-white rounded-2xl p-3 shadow-sm"
              >
                <span className="text-2xl w-11 h-11 flex items-center justify-center
                  bg-yellow-50 rounded-xl flex-shrink-0">
                  {task.icon}
                </span>
                <div className="flex-1">
                  <div className="font-bold text-gray-700 text-sm">{task.name}</div>
                  <div className="text-xs text-gray-400">ID: {task.id}</div>
                </div>
                <div className="text-right">
                  <div className="font-black text-gray-600 text-base">¥{task.price}</div>
                  <div className="text-xs text-gray-400">1かいぶん</div>
                </div>
              </div>
            ))}
          </div>

          {/* 接続ステータス */}
          <div className={`rounded-2xl p-3 text-sm
            ${isOffline ? 'bg-orange-50 text-orange-600' : 'bg-green-50 text-green-600'}`}>
            <div className="font-bold mb-0.5">
              {isOffline ? '⚠️ オフラインモード' : '✅ オンライン'}
            </div>
            <div className="text-xs">
              {isOffline
                ? 'GASサーバーにつながっていません。index.html の GAS_URL を確認してください。'
                : 'GASサーバーと正常につながっています。'}
            </div>
          </div>

          <div className="mt-4 text-center text-xs text-gray-400 leading-relaxed">
            ※ おてつだいのしゅるいや金がくは、<br />
            スプレッドシートの Tasks シートで かんりしています。
          </div>
        </div>
      );
    }

    // ======================================================
    //  ボトムナビゲーション
    // ======================================================
    function BottomNav({ screen, onChange }) {
      const items = [
        { id: 'calendar',  icon: '📅', label: 'カレンダー' },
        { id: 'allowance', icon: '💰', label: 'おこづかい' },
        { id: 'settings',  icon: '⚙️', label: 'せってい'  },
      ];
      return (
        <nav className="flex bg-white border-t border-gray-100 safe-bottom shadow-lg flex-shrink-0">
          {items.map(item => {
            const active = screen === item.id;
            return (
              <button
                key={item.id}
                onClick={() => onChange(item.id)}
                className={`flex-1 flex flex-col items-center py-2 gap-0.5 transition-all
                  active:scale-90
                  ${active ? 'text-yellow-500' : 'text-gray-300'}`}
              >
                <span className="text-xl">{item.icon}</span>
                <span className={`text-xs font-bold ${active ? 'text-yellow-500' : 'text-gray-400'}`}>
                  {item.label}
                </span>
              </button>
            );
          })}
        </nav>
      );
    }

    // ======================================================
    //  メインアプリ
    // ======================================================
    function App() {
      const today = new Date();

      const [screen,       setScreen]       = useState('calendar');
      const [currentUserId, setCurrentUserId] = useState('u1');
      const [currentMonth, setCurrentMonth] = useState({
        year:  today.getFullYear(),
        month: today.getMonth(),
      });
      const [tasks,      setTasks]      = useState([]);
      const [records,    setRecords]    = useState({});
      const [loading,    setLoading]    = useState(true);
      const [isOffline,  setIsOffline]  = useState(false);
      const [selectedDay, setSelectedDay] = useState(null);
      const [toast,       setToast]      = useState(null);

      // ---- トースト ----
      const showToast = useCallback((message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 2000);
      }, []);

      // ---- データ読み込み ----
      useEffect(() => {
        (async () => {
          try {
            const res = await fetch(GAS_URL, { redirect: 'follow' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            setTasks(data.tasks   || MOCK_TASKS);
            setRecords(data.records || {});
            setIsOffline(false);
          } catch (err) {
            console.warn('[おてつだいアプリ] GAS取得失敗。モックデータを使用:', err.message);
            setTasks(MOCK_TASKS);
            setRecords({});
            setIsOffline(true);
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      // ---- タスクのトグル ----
      const handleToggle = useCallback(async (dateKey, userId, taskId, isDone) => {
        if (isOffline) return;
        const action = isDone ? 'remove' : 'add';

        // オプティミスティック更新
        const applyChange = (prev, forward) => {
          const next = JSON.parse(JSON.stringify(prev));
          if (!next[dateKey])         next[dateKey] = {};
          if (!next[dateKey][userId]) next[dateKey][userId] = [];

          if (forward ? action === 'add' : action === 'remove') {
            if (!next[dateKey][userId].includes(taskId)) {
              next[dateKey][userId].push(taskId);
            }
          } else {
            next[dateKey][userId] = next[dateKey][userId].filter(id => id !== taskId);
            if (next[dateKey][userId].length === 0) delete next[dateKey][userId];
            if (Object.keys(next[dateKey] || {}).length === 0) delete next[dateKey];
          }
          return next;
        };

        setRecords(prev => applyChange(prev, true));

        try {
          const res = await fetch(GAS_URL, {
            method:   'POST',
            redirect: 'follow',
            headers:  { 'Content-Type': 'text/plain' },
            body:     JSON.stringify({ action, dateKey, userId, taskId }),
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (data.status !== 'success') throw new Error(data.message || 'unknown error');
          showToast(action === 'add' ? 'シールをはったよ！🌟' : 'シールをはがしたよ ✔️');
        } catch (err) {
          console.error('[おてつだいアプリ] POST失敗:', err);
          showToast('ほぞんにしっぱいしました 😢', 'error');
          // ロールバック
          setRecords(prev => applyChange(prev, false));
        }
      }, [isOffline, showToast]);

      // ---- ローディング画面 ----
      if (loading) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-yellow-50">
            <div className="text-center">
              <div className="text-6xl animate-bounce mb-4">⭐</div>
              <div className="font-bold text-gray-400 text-sm">よみこみちゅう...</div>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-screen max-w-md mx-auto bg-yellow-50 overflow-hidden">
          {/* トースト通知 */}
          {toast && <Toast message={toast.message} type={toast.type} />}

          {/* ヘッダー */}
          <header className="bg-white shadow-sm px-4 py-2 flex items-center justify-between flex-shrink-0">
            <div className="flex items-center gap-2">
              <span className="text-2xl">⭐</span>
              <span className="font-black text-gray-700 text-base leading-tight">
                おてつだい<br className="hidden" />シール帳
              </span>
            </div>
            {isOffline && (
              <span className="text-xs bg-orange-100 text-orange-500 px-2 py-1 rounded-full font-bold">
                オフライン
              </span>
            )}
          </header>

          {/* ユーザータブ */}
          <div className="bg-white border-b border-gray-100 flex-shrink-0">
            <UserTabs currentUserId={currentUserId} onChange={setCurrentUserId} />
          </div>

          {/* メインコンテンツ */}
          <main className="flex-1 overflow-hidden">
            {screen === 'calendar' && (
              <CalendarScreen
                tasks={tasks}
                records={records}
                currentUserId={currentUserId}
                currentMonth={currentMonth}
                setCurrentMonth={setCurrentMonth}
                onDayClick={setSelectedDay}
              />
            )}
            {screen === 'allowance' && (
              <AllowanceScreen
                tasks={tasks}
                records={records}
                currentUserId={currentUserId}
                currentMonth={currentMonth}
              />
            )}
            {screen === 'settings' && (
              <SettingsScreen tasks={tasks} isOffline={isOffline} />
            )}
          </main>

          {/* ボトムナビ */}
          <BottomNav screen={screen} onChange={setScreen} />

          {/* 日選択モーダル */}
          {selectedDay && (
            <DayModal
              dateKey={selectedDay}
              tasks={tasks}
              records={records}
              currentUserId={currentUserId}
              onToggle={handleToggle}
              onClose={() => setSelectedDay(null)}
              isOffline={isOffline}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
